<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>✨ Sewa Bot Premium ✨</title>
    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0b0c1a;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
        }

        /* ===== BACKGROUND GAMBAR ===== */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('https://files.catbox.moe/51xxpb.jpg') no-repeat center center;
            background-size: cover;
            opacity: 0.35;
            z-index: 0;
            filter: blur(2px) brightness(0.7);
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            width: 100%;
            background: rgba(22, 26, 40, 0.82);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 215, 0, 0.25);
            border-radius: 40px;
            padding: 2rem 2.5rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 215, 0, 0.1) inset;
            transition: all 0.3s ease;
        }

        /* ========== LAYOUT LANDSCAPE ========== */
        .landscape-grid {
            display: grid;
            grid-template-columns: 1fr 1.6fr;
            gap: 2rem;
            align-items: start;
        }

        /* ===== KOLOM KIRI ===== */
        .left-col {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* judul utama dengan gambar */
        .title-section {
            text-align: center;
            margin-bottom: 0.2rem;
        }

        .title-section .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .title-section .logo-img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 20px rgba(245, 179, 66, 0.15);
            transition: 0.3s;
        }

        .title-section .logo-img:hover {
            transform: scale(1.05);
            border-color: #f5b342;
            box-shadow: 0 0 30px rgba(245, 179, 66, 0.3);
        }

        .title-section h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f9e05d, #f5b342);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(245, 179, 66, 0.3);
        }

        .title-section .sub-glow {
            color: #b9c2e0;
            font-weight: 400;
            letter-spacing: 3px;
            background: rgba(255, 215, 0, 0.08);
            display: inline-block;
            padding: 6px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 215, 0, 0.15);
            margin-top: 6px;
            font-size: 0.8rem;
        }

        /* grid harga - WARNA MERAH - landscape */
        .price-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            background: rgba(12, 14, 26, 0.6);
            padding: 1.2rem 1rem;
            border-radius: 32px;
            border: 1px solid rgba(255, 0, 0, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .price-item {
            background: rgba(30, 34, 54, 0.7);
            backdrop-filter: blur(4px);
            padding: 10px 6px;
            border-radius: 28px;
            text-align: center;
            border: 1px solid rgba(255, 0, 0, 0.15);
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .price-item:hover {
            transform: translateY(-2px);
            border-color: #ff2222;
            box-shadow: 0 8px 16px rgba(255, 0, 0, 0.25);
            background: rgba(60, 20, 20, 0.8);
        }

        .price-item .duration {
            display: block;
            font-weight: 600;
            color: #ff6666;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        .price-item .price {
            display: block;
            font-weight: 800;
            font-size: 1.1rem;
            color: #ff3333;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
            margin-top: 2px;
        }

        .price-item .badge-permanent {
            background: linear-gradient(135deg, #ff2222, #cc0000);
            color: #ffffff;
            font-weight: 700;
            font-size: 0.55rem;
            padding: 3px 8px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 2px;
            letter-spacing: 0.5px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        /* ===== KOLOM KANAN ===== */
        .right-col {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* keuntungan */
        .benefit-box {
            background: rgba(10, 12, 24, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 1.2rem 1.5rem 1rem 1.5rem;
            border: 1px solid rgba(255, 215, 0, 0.08);
        }

        .benefit-box h3 {
            color: #f5d06a;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.7rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .benefit-box h3 i {
            color: #f5b342;
            filter: drop-shadow(0 0 6px #f5b342);
        }

        .benefit-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .benefit-item {
            background: rgba(24, 28, 48, 0.5);
            padding: 8px 12px;
            border-radius: 20px;
            border-left: 3px solid #f5b342;
            color: #cbd3f0;
            font-weight: 500;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(2px);
            transition: 0.2s;
        }

        .benefit-item i {
            color: #f5b342;
            width: 18px;
            text-align: center;
            font-size: 0.9rem;
        }

        .benefit-item:hover {
            background: rgba(40, 44, 74, 0.7);
            border-left-color: #f7d875;
        }

        .fitur-highlight {
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.25);
            padding: 10px 16px;
            border-radius: 28px;
            color: #b9c8f0;
            font-size: 0.85rem;
            border: 1px dashed rgba(255, 215, 0, 0.2);
            text-align: center;
        }

        .fitur-highlight i {
            color: #f5b342;
            margin: 0 6px;
        }

        /* pembayaran mewah - landscape */
        .payment-section {
            background: radial-gradient(circle at 20% 30%, rgba(40, 35, 20, 0.5), rgba(12, 14, 26, 0.9));
            border-radius: 32px;
            padding: 1.2rem 1.5rem 1.2rem 1.5rem;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 30px rgba(245, 179, 66, 0.05);
        }

        .payment-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #f5d06a;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .payment-title i {
            color: #f5b342;
            filter: drop-shadow(0 0 10px #f5b342);
        }

        .payment-methods {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem 1.5rem;
            align-items: stretch;
        }

        .method {
            flex: 1 1 150px;
            min-width: 140px;
            max-width: 200px;
            background: rgba(16, 18, 34, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 0.8rem 1rem 1rem 1rem;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.15);
            transition: 0.3s;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .method:hover {
            transform: scale(1.03);
            border-color: #f5b342;
            box-shadow: 0 0 30px rgba(245, 179, 66, 0.15);
        }

        .method .method-icon {
            font-size: 1.8rem;
            color: #f5b342;
            margin-bottom: 4px;
            filter: drop-shadow(0 0 8px #f5b34255);
        }

        .method .method-name {
            font-weight: 700;
            color: #e8edff;
            font-size: 0.95rem;
            margin-bottom: 2px;
        }

        .method .method-owner {
            font-size: 0.7rem;
            color: #b0bcdb;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 12px;
            border-radius: 40px;
            display: inline-block;
            margin-bottom: 6px;
        }

        .method .copy-number {
            background: rgba(245, 179, 66, 0.12);
            border: 1px solid rgba(245, 179, 66, 0.3);
            padding: 6px 8px;
            border-radius: 40px;
            font-weight: 600;
            color: #f5d06a;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 4px;
            backdrop-filter: blur(4px);
            width: 100%;
        }

        .method .copy-number i {
            color: #f5b342;
        }

        .method .copy-number:hover {
            background: rgba(245, 179, 66, 0.25);
            border-color: #f5b342;
        }

        /* ===== QRIS dengan tombol download ===== */
        .method .qr-wrapper {
            position: relative;
            margin-top: 8px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 16px rgba(0, 0, 0, 0.5);
            transition: 0.3s;
            background: #0b0c1a;
            max-width: 100px;
            width: 100%;
        }

        .method .qr-wrapper:hover {
            border-color: #f5b342;
            box-shadow: 0 0 25px rgba(245, 179, 66, 0.2);
        }

        .method .qr-wrapper img {
            width: 100%;
            display: block;
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        .method .btn-download {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            color: #fff;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.75rem;
            text-decoration: none;
        }

        .method .btn-download:hover {
            background: rgba(245, 179, 66, 0.3);
            border-color: #f5b342;
            transform: scale(1.1);
        }

        .method .btn-download i {
            color: #f5b342;
            font-size: 0.7rem;
        }

        /* Tombol WhatsApp */
        .btn-wa {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.3);
            margin-top: 8px;
            width: 100%;
            justify-content: center;
            letter-spacing: 0.5px;
        }

        .btn-wa i {
            font-size: 1.1rem;
        }

        .btn-wa:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 28px rgba(37, 211, 102, 0.45);
        }

        .btn-wa:active {
            transform: scale(0.97);
        }

        .footer-note {
            text-align: center;
            margin-top: 1.2rem;
            color: #6a75a0;
            font-size: 0.7rem;
            border-top: 1px solid rgba(255, 215, 0, 0.05);
            padding-top: 1rem;
            letter-spacing: 0.5px;
            grid-column: 1 / -1;
        }

        .footer-note i {
            color: #f5b342;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 1024px) {
            .landscape-grid {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }
            .card {
                padding: 1.5rem;
                border-radius: 32px;
            }
            .price-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .benefit-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .payment-methods {
                gap: 1rem;
            }
            .method {
                max-width: 220px;
                min-width: 160px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .card {
                padding: 1.2rem;
                border-radius: 28px;
            }
            .title-section h1 {
                font-size: 1.8rem;
            }
            .title-section .logo-img {
                width: 45px;
                height: 45px;
            }
            .price-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 6px;
                padding: 0.8rem;
            }
            .price-item {
                padding: 8px 4px;
                border-radius: 20px;
            }
            .price-item .duration {
                font-size: 0.7rem;
            }
            .price-item .price {
                font-size: 0.95rem;
            }
            .benefit-grid {
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }
            .benefit-item {
                font-size: 0.7rem;
                padding: 6px 10px;
            }
            .payment-methods {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 0.8rem;
            }
            .method {
                flex: 1 1 120px;
                min-width: 120px;
                max-width: 180px;
                padding: 0.6rem 0.8rem 0.8rem 0.8rem;
                border-radius: 20px;
            }
            .method .method-name {
                font-size: 0.8rem;
            }
            .method .qr-wrapper {
                max-width: 80px;
            }
            .method .copy-number {
                font-size: 0.65rem;
                padding: 4px 6px;
            }
            .method .btn-download {
                width: 22px;
                height: 22px;
                font-size: 0.6rem;
                bottom: 4px;
                right: 4px;
            }
            .method .btn-download i {
                font-size: 0.6rem;
            }
            .btn-wa {
                font-size: 0.75rem;
                padding: 6px 12px;
            }
            .payment-title {
                font-size: 1rem;
            }
            .benefit-box h3 {
                font-size: 0.95rem;
            }
            .fitur-highlight {
                font-size: 0.75rem;
                padding: 8px 12px;
            }
        }

        @media (max-width: 480px) {
            .price-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .benefit-grid {
                grid-template-columns: 1fr;
            }
            .payment-methods {
                flex-direction: column;
                align-items: center;
            }
            .method {
                max-width: 260px;
                width: 100%;
            }
            .method .qr-wrapper {
                max-width: 100px;
            }
            .landscape-grid {
                gap: 0.8rem;
            }
            .title-section h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

        <div class="landscape-grid">

            <!-- ===== KOLOM KIRI ===== -->

                <div class="title-section">

            </div>

            <!-- ===== KOLOM KANAN ===== -->
            <div class="right-col">

                    <div class="benefit-grid">

                        <div class="benefit-item"><i class="fas fa-gift"></i> 8 Bulan → Free 60 har
